name: Build TaskFlow for Windows

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install npm dependencies
        run: npm install

      - name: Type-check TypeScript
        run: npx tsc --noEmit

      - name: Sync version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}" -replace '^v', ''
          Write-Host "Syncing version to $tag"
          # package.json
          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          $pkg.version = $tag
          $pkg | ConvertTo-Json -Depth 10 | Set-Content package.json
          # tauri.conf.json
          $tauri = Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json
          $tauri.version = $tag
          $tauri | ConvertTo-Json -Depth 10 | Set-Content src-tauri/tauri.conf.json
          # Cargo.toml — patch version field
          (Get-Content src-tauri/Cargo.toml) -replace '^version = ".*"', "version = `"$tag`"" | Set-Content src-tauri/Cargo.toml

      - name: Build Tauri app (NSIS + MSI)
        run: npm run tauri:build -- --target x86_64-pc-windows-msvc

      - name: List build artifacts
        shell: pwsh
        run: |
          Get-ChildItem -Path src-tauri/target/x86_64-pc-windows-msvc/release/bundle -Recurse -File | Select-Object FullName, Length

      - name: Upload NSIS installer (per-user, no admin)
        uses: actions/upload-artifact@v4
        with:
          name: TaskFlow-NSIS-Installer
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          if-no-files-found: warn

      - name: Upload MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: TaskFlow-MSI-Installer
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
          if-no-files-found: warn

      - name: Upload portable executable
        uses: actions/upload-artifact@v4
        with:
          name: TaskFlow-Portable
          path: src-tauri/target/x86_64-pc-windows-msvc/release/taskflow.exe
          if-no-files-found: warn

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            src-tauri/target/x86_64-pc-windows-msvc/release/taskflow.exe
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
